version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver_ticket
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Password123
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

  sua-api:
    build: .
    container_name: ticket_api
    depends_on:
      - sqlserver
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=TicketDb;User Id=sa;Password=Password123;TrustServerCertificate=True;
    ports:
      - "5000:80"  # Ajuste conforme sua porta

volumes:
  sqlserver_data: